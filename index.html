<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>그 뭐냐 그거</title>
  <!-- SEO Meta Tags -->
  <meta name="description" content="이름이 생각나지 않는 일상 속 사물들을 찾아주는 인터랙티브 사전, '그 뭐냐 그거'">
  <meta name="keywords" content="그 뭐냐 그거, 사물 이름, 사물 사전, 피자 삼발이, 바란, 트위스트 타이">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Pen+Script&family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
    rel="stylesheet">
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- Header Section -->
  <header class="app-header">
    <div class="header-left">
      <h1 class="logo-text" id="logo-button">그 뭐냐 그거</h1>
    </div>

    <div class="header-center">
      <div class="search-bar" id="search-bar-container">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="search-input" placeholder="#찾아보기" autocomplete="off">
        <button id="search-clear-btn" class="search-clear-btn" aria-label="검색어 지우기">&times;</button>
        <div id="search-dropdown" class="search-dropdown hidden"></div>
      </div>
    </div>

    <div class="header-right">
      <button class="action-btn" id="upload-btn" title="사물 추가하기" aria-label="사물 추가하기">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="17 8 12 3 7 8"></polyline>
          <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
      </button>
      <div class="profile-icon" id="profile-btn" title="내 프로필">
        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=80&fit=crop&q=80" alt="프로필">
      </div>
    </div>
  </header>

  <!-- Neon Gradient Stripe -->
  <div class="neon-stripe"></div>

  <!-- Main Container -->
  <main class="app-main">
    <div class="binder-wrapper">

      <!-- Binder Container -->
      <div class="binder-container" id="binder">

        <!-- Left Index Tabs -->
        <div class="binder-tabs">
          <button class="tab-item active" data-category="all" style="background-color: #ff5f56;"></button>
          <button class="tab-item" data-category="kitchen" style="background-color: #ffbd2e;"></button>
          <button class="tab-item" data-category="office" style="background-color: #27c93f;"></button>
          <button class="tab-item" data-category="misc" style="background-color: #4b89ff;"></button>
        </div>

        <!-- Left Navigation Arrow -->
        <button class="nav-arrow nav-prev" id="prev-btn" aria-label="이전 페이지">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" fill="currentColor" />
          </svg>
        </button>

        <!-- Binder Page Area -->
        <div class="binder-page" id="binder-page">
          <!-- Page 1 (Active by default) -->
          <div class="page-content" id="page-1">
            <div class="grid-overlay"></div>
            <!-- Interactive Items will be injected here by JS -->
            <div class="items-container" id="items-container-p1"></div>
          </div>

          <!-- Page 2 (Hidden by default, for navigation demo) -->
          <div class="page-content hidden" id="page-2">
            <div class="grid-overlay"></div>
            <div class="coming-soon-container">
              <h2 class="coming-soon-title">더 많은 사물 준비 중!</h2>
              <p class="coming-soon-text">이름을 알고 싶은 또 다른 사물이 있나요? 오른쪽 위의 업로드 버튼을 눌러 등록해 주세요!</p>
              <button class="suggest-btn" id="suggest-btn">사물 제보하기</button>
            </div>
          </div>
        </div>

        <!-- Right Navigation Arrow -->
        <button class="nav-arrow nav-next" id="next-btn" aria-label="다음 페이지">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z" fill="currentColor" />
          </svg>
        </button>

        <!-- Spiral Binder Rings (Right Side) -->
        <div class="binder-rings" id="binder-rings">
          <!-- Rings will be generated by JavaScript or hardcoded in CSS -->
        </div>

      </div>
    </div>
  </main>

  <!-- Detail Modal -->
  <div class="modal-backdrop hidden" id="detail-modal">
    <div class="modal-card">
      <button class="modal-close" id="modal-close-btn">&times;</button>
      <div class="modal-body">
        <div class="modal-img-container">
          <img src="" alt="" id="modal-item-img">
        </div>
        <div class="modal-info">
          <div class="modal-names">
            <h2 class="modal-common-name" id="modal-common-name">사물 이름</h2>
            <span class="modal-official-name" id="modal-official-name">공식 명칭</span>
          </div>
          <p class="modal-description" id="modal-description">사물에 대한 자세한 설명이 들어갑니다.</p>
          <div class="modal-tags" id="modal-tags">
            <!-- Tags will be injected here -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Contribute Modal (Upload) -->
  <div class="modal-backdrop hidden" id="upload-modal">
    <div class="modal-card upload-card">
      <button class="modal-close" id="upload-close-btn">&times;</button>
      <h2 class="upload-title">새로운 사물 제보하기</h2>
      <form id="upload-form" class="upload-form">
        <div class="form-group">
          <label for="input-common-name">익숙한 이름 (예: 피자 삼발이)</label>
          <input type="text" id="input-common-name" placeholder="그 뭐라고 부르는 사물인가요?" required>
        </div>
        <div class="form-group">
          <label for="input-official-name">공식/진짜 이름 (예: 피자 세이버)</label>
          <input type="text" id="input-official-name" placeholder="진짜 이름은 무엇인가요? (모르면 비워두세요)">
        </div>
        <div class="form-group">
          <label for="input-description">어떨 때 쓰는 물건인가요?</label>
          <textarea id="input-description" rows="3" placeholder="용도나 특징을 설명해 주세요..." required></textarea>
        </div>
        <div class="form-group">
          <label>사물 이미지 등록</label>
          <div class="upload-dropzone" id="upload-dropzone">
            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <circle cx="8.5" cy="8.5" r="1.5"></circle>
              <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
            <p>클릭하여 이미지 파일을 올리거나 드래그해 주세요.</p>
          </div>
        </div>
        <button type="submit" class="submit-btn">제보 등록하기</button>
      </form>
    </div>
  </div>

  <!-- JavaScript file -->
  <script src="app.js"></script>
</body>

</html>
